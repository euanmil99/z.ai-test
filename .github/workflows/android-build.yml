name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Clone SuperWebView template
      run: |
        git clone https://github.com/roozbehzarei/SuperWebView.git android-app
        cd android-app
        
    - name: Configure app for SwarmForge
      run: |
        cd android-app
        # Update the website URL in MainActivity.kt
        sed -i 's|const val WEBSITE = ".*"|const val WEBSITE = "https://euanmil99.github.io/z.ai-test/"|' app/src/main/java/com/roozbehzarei/superwebview/MainActivity.kt
        
        # Update app name in strings.xml
        sed -i 's|<string name="app_name">.*</string>|<string name="app_name">SwarmForge</string>|' app/src/main/res/values/strings.xml
        
        # Update package name in build.gradle.kts
        sed -i 's|namespace = ".*"|namespace = "com.euanmil99.swarmforge"|' app/build.gradle.kts
        sed -i 's|applicationId = ".*"|applicationId = "com.euanmil99.swarmforge"|' app/build.gradle.kts
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Grant execute permission for gradlew
      run: |
        cd android-app
        chmod +x gradlew
        
    - name: Build APK
      run: |
        cd android-app
        ./gradlew assembleRelease
        
    - name: Sign APK
      run: |
        cd android-app
        # For now, we'll use the debug APK. In production, you'd sign the release APK properly
        ./gradlew assembleDebug
        
    - name: Rename and copy APK
      run: |
        mkdir -p apk-output
        cp android-app/app/build/outputs/apk/debug/app-debug.apk apk-output/SwarmForge-v1.0.apk
        
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: SwarmForge-APK
        path: apk-output/SwarmForge-v1.0.apk
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: github.ref == 'refs/heads/main'
      with:
        tag_name: android-v1.0.${{ github.run_number }}
        name: SwarmForge Android v1.0.${{ github.run_number }}
        body: |
          ## SwarmForge Android App
          
          This is an automatically generated Android APK for the SwarmForge Multi-Agent System.
          
          ### Features:
          - WebView-based Android app
          - Loads the SwarmForge web interface
          - Progress indicator
          - Pull-to-refresh
          - Optimized for mobile devices
          
          ### Installation:
          1. Download the APK file
          2. Enable "Install from Unknown Sources" on your Android device
          3. Open the APK file to install
          
          **Note:** This is a debug build. For production use, a properly signed release build should be used.
        files: apk-output/SwarmForge-v1.0.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
